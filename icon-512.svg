<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#ffffff"/>

  <!-- FiFT in dark green, O in red — matching actual logo -->
  <!-- F -->
  <text x="18" y="330" font-family="Arial Black,Impact,sans-serif" font-size="270" font-weight="900" fill="#1a6b2e">F</text>
  <!-- i (lowercase, smaller) -->
  <text x="162" y="330" font-family="Arial Black,Impact,sans-serif" font-size="210" font-weight="900" fill="#1a6b2e">i</text>
  <!-- Red dot on i -->
  <circle cx="202" cy="82" r="28" fill="#cc2200"/>
  <!-- FT -->
  <text x="210" y="330" font-family="Arial Black,Impact,sans-serif" font-size="270" font-weight="900" fill="#1a6b2e">FT</text>
  <!-- O in red -->
  <text x="398" y="330" font-family="Arial Black,Impact,sans-serif" font-size="270" font-weight="900" fill="#cc2200">O</text>

  <!-- Tagline divider lines -->
  <line x1="20" y1="370" x2="235" y2="370" stroke="#1a6b2e" stroke-width="8" stroke-linecap="round"/>
  <line x1="255" y1="370" x2="492" y2="370" stroke="#cc2200" stroke-width="8" stroke-linecap="round"/>
</svg>
